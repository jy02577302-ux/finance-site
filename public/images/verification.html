<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Verification - STRESS FREE FINANCE</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #111827; margin-bottom: 30px; }
    .category { margin-bottom: 40px; }
    .category h2 { color: #374151; border-bottom: 2px solid #d4a855; padding-bottom: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
    .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card img { width: 100%; height: 200px; object-fit: cover; display: block; }
    .card-body { padding: 15px; }
    .card-title { font-weight: 600; margin-bottom: 8px; color: #111827; }
    .card-meta { font-size: 12px; color: #6b7280; }
    .status { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-top: 8px; }
    .status.ok { background: #d1fae5; color: #047857; }
    .status.fail { background: #fee2e2; color: #b91c1c; }
    .size { color: #6b7280; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>🖼️ Image Verification Page</h1>

  <div class="category">
    <h2>👥 Team Photos (About Page)</h2>
    <div class="grid" id="team-grid"></div>
  </div>

  <div class="category">
    <h2>🏢 Office (About Page)</h2>
    <div class="grid" id="office-grid"></div>
  </div>

  <div class="category">
    <h2>🧮 Mortgage Dashboard (Calculators Page)</h2>
    <div class="grid" id="calculator-grid"></div>
  </div>

  <div class="category">
    <h2>🏠 Product Hero Images (Product Pages)</h2>
    <div class="grid" id="products-grid"></div>
  </div>

  <script>
    const images = {
      team: [
        { path: '/images/team/steven-mo.jpg', title: 'Steven Mo', size: '86 KB', expected: '800x800' },
        { path: '/images/team/sarah-chen.jpg', title: 'Sarah Chen', size: '73 KB', expected: '800x800' },
        { path: '/images/team/david-liu.jpg', title: 'David Liu', size: '193 KB', expected: '800x800' }
      ],
      office: [
        { path: '/images/office/office-main.jpg', title: 'Office Main', size: '183 KB', expected: '1600x900' }
      ],
      calculator: [
        { path: '/images/mortgage-dashboard.jpg', title: 'Mortgage Dashboard', size: '114 KB', expected: '1200x400' }
      ],
      products: [
        { path: '/images/products/business-office.jpg', title: 'Business Office', size: '198 KB', expected: '1200x500' },
        { path: '/images/products/investment-growth.jpg', title: 'Investment Growth', size: '73 KB', expected: '1200x500' },
        { path: '/images/products/development-site.jpg', title: 'Development Site', size: '277 KB', expected: '1200x500' },
        { path: '/images/products/construction-site.jpg', title: 'Construction Site', size: '200 KB', expected: '1200x500' },
        { path: '/images/products/home-loan-hero.jpg', title: 'Home Loan Hero', size: '272 KB', expected: '1200x500' }
      ]
    };

    function createCard(imgData, category) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${imgData.path}" alt="${imgData.title}" loading="lazy" onload="this.parentElement.querySelector('.status').className='status ok'; this.parentElement.querySelector('.status').textContent='✅ Loaded'" onerror="this.parentElement.querySelector('.status').className='status fail'; this.parentElement.querySelector('.status').textContent='❌ Failed'">
        <div class="card-body">
          <div class="card-title">${imgData.title}</div>
          <div class="card-meta">Expected: ${imgData.expected} | File: ${imgData.size}</div>
          <div class="status">⏳ Loading...</div>
        </div>
      `;
      return card;
    }

    function renderGrid(gridId, imgList) {
      const grid = document.getElementById(gridId);
      imgList.forEach(img => {
        grid.appendChild(createCard(img, gridId));
      });
    }

    renderGrid('team-grid', images.team);
    renderGrid('office-grid', images.office);
    renderGrid('calculator-grid', images.calculator);
    renderGrid('products-grid', images.products);
  </script>
</body>
</html>
