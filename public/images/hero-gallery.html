<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Images Gallery - STRESS FREE FINANCE</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #111827; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; margin-top: 20px; }
    .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card img { width: 100%; height: 200px; object-fit: cover; display: block; }
    .card-body { padding: 15px; }
    .card-title { font-weight: 600; margin-bottom: 8px; color: #111827; }
    .card-meta { font-size: 12px; color: #6b7280; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-top: 4px; }
    .badge.hero { background: #dbeafe; color: #1e40af; }
    .badge.page { background: #dcfce7; color: #166534; }
  </style>
</head>
<body>
  <h1>🖼️ Hero Images Gallery</h1>
  <p>All Hero section background images used across the site (latest v2 versions).</p>

  <div class="grid" id="gallery"></div>

  <script>
    const images = [
      { filename: 'about-hero.jpg', title: 'About Page (EN/ZH)', type: 'hero' },
      { filename: 'calculators-hero.jpg', title: 'Calculators Page (EN/ZH)', type: 'hero' },
      { filename: 'contact-hero.jpg', title: 'Contact Page (EN/ZH)', type: 'hero' },
      { filename: 'home-loan-hero-v2.jpg', title: 'Home Loan Product (EN/ZH)', type: 'page' },
      { filename: 'business-office-v2.jpg', title: 'Business Loan Product (EN/ZH)', type: 'page' },
      { filename: 'investment-growth-v2.jpg', title: 'Investment Product (EN/ZH)', type: 'page' },
      { filename: 'development-site-v2.jpg', title: 'Development Loan Product (EN/ZH)', type: 'page' },
      { filename: 'construction-site-v2.jpg', title: 'Construction Loan Product (EN/ZH)', type: 'page' }
    ];

    const gallery = document.getElementById('gallery');
    images.forEach(img => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="/images/${img.filename}" alt="${img.title}" loading="lazy" onerror="this.style.opacity=0.3; this.title='Failed to load'">
        <div class="card-body">
          <div class="card-title">${img.title}</div>
          <div class="card-meta">File: ${img.filename}</div>
          <span class="badge ${img.type}">${img.type === 'hero' ? 'Section Hero' : 'Product Page'}</span>
        </div>
      `;
      gallery.appendChild(card);
    });
  </script>
</body>
</html>
